# ============================
# Server
# ============================
server.port=8080

# ============================
# Database (MySQL)
# Change username/password to match your local MySQL setup
# Create the database first: CREATE DATABASE expense_tracker_db;
# ============================
spring.datasource.url=jdbc:mysql://localhost:3306/expense_tracker_db?createDatabaseIfNotExist=true
spring.datasource.username=admin
spring.datasource.password=your_mysql_password_here
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================
# JPA / Hibernate
# update = auto-creates/updates tables based on entities (fine for dev, use migrations like Flyway in production)
# ============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================
# JWT
# IMPORTANT: replace this secret with your own long random string before deploying anywhere public
# Must be at least 256 bits (32+ characters) for HS256
# ============================
jwt.secret=ChangeThisToALongRandomSecretKeyAtLeast32CharsLongForHS256
jwt.expiration=86400000
